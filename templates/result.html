<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả tra cứu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }
        .box {
            width: 520px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }
        img {
            max-width: 320px;
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
        }
        a {
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>KẾT QUẢ TRA CỨU</h2>
        <p><strong>Họ tên:</strong> {{ student_name }}</p>
        <p><strong>CCCD:</strong> {{ cccd }}</p>

        <img src="{{ url_for('serve_qr', filename=filename) }}" alt="QR">

        <div>
            <a href="{{ url_for('serve_qr', filename=filename) }}" download>Tải ảnh QR</a>
        </div>
        <div>
            <a href="{{ url_for('index') }}">Tra cứu lại</a>
        </div>
    </div>
</body>
</html>
