<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu mã QR - Trung tâm GDNN & SHLX Đặng Lâm</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }

        .brand {
            margin-bottom: 24px;
        }

        .brand h2 {
            margin: 0;
            font-size: 24px;
            color: #0d47a1;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .brand p {
            margin: 8px 0 0;
            font-size: 14px;
            color: #666;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            color: #222;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1976d2;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #125db2;
        }

        .error {
            margin-top: 16px;
            color: #d32f2f;
            font-size: 14px;
            font-weight: 500;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <h2>Trung tâm GDNN & SHLX Đặng Lâm</h2>
            <p>Hệ thống tra cứu mã QR học viên</p>
        </div>

        <h1>TRA CỨU MÃ QR</h1>

        <form method="POST">
            <input type="text" name="cccd" placeholder="Nhập số CCCD">
            <button type="submit">Tra cứu</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer-note">
            Vui lòng nhập đúng số CCCD để tra cứu thông tin mã QR.
        </div>
    </div>
</body>
</html>
